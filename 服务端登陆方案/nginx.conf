# ==================== Nginx 更新服务器配置 ====================
# 支持多项目、多渠道版本管理和强制更新
#
# 项目架构（并存示例）：
#   - ai-anime-user （用户端）
#       - stable (正式版)
#       - beta (测试版)
#   - ai-anime-admin （管理端）
#       - stable (正式版)
#       - beta (测试版)
#   - momentum-stick-figure-user （用户端，历史项目）
#       - stable (正式版)
#       - beta (测试版)
#   - momentum-stick-figure-admin （管理端，历史项目）
#       - stable (正式版)
#       - beta (测试版)
#
# 【安全加固版】包含以下安全增强：
#   ✓ 限制访问方法（仅允许 GET、HEAD、OPTIONS）
#   ✓ 防止目录遍历攻击
#   ✓ 限制文件类型访问
#   ✓ 防DDoS速率限制
#   ✓ 安全响应头配置
#   ✓ IP访问日志和限制

# ==================== 全局安全配置 ====================
# 【安全】限制请求速率，防止DDoS攻击
limit_req_zone $binary_remote_addr zone=update_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=download_limit:10m rate=2r/s;
# 登录 API 专用限流，避免与更新接口的限流策略互相影响
limit_req_zone $binary_remote_addr zone=login_api_limit:10m rate=10r/s;

# 【安全】限制连接数
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ==================== 统一 IP 入口（多项目共用 80 端口） ====================
# 所有项目都通过 IP（例如：http://47.107.179.33）访问，
# 在同一个 server 中通过不同路径区分项目，避免 80 端口冲突。
server {
    listen 80;
    server_name 47.107.179.33;  # 你的服务器IP，如有域名可一并写在这里

    # 更新文件根目录（主要用于 momentum 旧项目，ai-anime 使用 alias 指向独立目录）
    # 新根路径：/www/update_server_web
    root /www/update_server_web;

    # 【安全】禁用目录浏览（生产环境必须关闭，防止信息泄露）
    autoindex off;

    # 【注意】不在全局限制HTTP方法，因为API需要POST
    # HTTP方法限制在各个location块中单独配置

    # 【安全】防止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 【安全】防止访问备份文件
    location ~* \.(bak|backup|old|orig|sql|tar|gz|zip)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 【安全】安全响应头
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 跨域支持（重要！Electron更新必需）
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Range' always;
    add_header Access-Control-Expose-Headers 'Content-Length, Content-Range' always;

    # 【安全】限制单个IP的并发连接数
    limit_conn conn_limit 20;

    # ==================== ai-anime 新项目（通过路径区分） ====================
    # 所有 ai-anime 相关访问统一走 IP + /ai-anime/... 路径，无需单独域名。

    # 【API 反向代理】
    # 路径: /ai-anime/api/
    # 代理到本机 3000 端口的 ai-anime API 服务
    location /ai-anime/api/ {
        proxy_pass http://localhost:3000/ai-anime/api/;
        proxy_http_version 1.1;

        # 代理头配置，保持真实 IP 等信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 【安全】限制更新 API 请求速率，防止暴力请求
        limit_req zone=update_limit burst=10 nodelay;

        # 超时配置
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # CORS 配置，支持前端跨域调用
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Range' always;
        add_header Access-Control-Max-Age 3600 always;

        # 处理 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ==================== ai-anime 登录 API ====================
    # 路径: /ai-anime/user/login/
    # 登录服务单独监听 127.0.0.1:3100，避免与旧 momentum 服务或 ai-anime 其他 API 抢占 3000 端口。
    # （在服务器 .env 中设置 PORT=3100，并在 pm2 启动命令中加载该环境变量）
    location /ai-anime/user/login/ {
        proxy_pass http://localhost:3100/ai-anime/user/login/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 登录接口使用独立限流策略，更严格限制爆破尝试
        limit_req zone=login_api_limit burst=10 nodelay;

        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;
        add_header Access-Control-Max-Age 3600 always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # 将登录接口访问单独写入日志，方便排查异常
        access_log /www/wwwlogs/ai_anime_login_access.log;
    }

    # ==================== ai-anime 用户端发布 - 正式版 ====================
    # 路径: /ai-anime/releases/client/stable/
    # 对应目录: /www/ai_anime/releases/client/stable/
    location /ai-anime/releases/client/stable/ {
        alias /www/ai_anime/releases/client/stable/;

        # 【安全】只允许 GET / HEAD / OPTIONS 方法
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        # 【安全】限制请求速率
        limit_req zone=update_limit burst=20 nodelay;

        # 【安全】仅允许访问更新相关文件类型
        location ~* \.(exe|blockmap|yml|json)$ {
        }

        # 【安全】拒绝其他所有文件类型
        location ~* \.*$ {
            return 403;
        }

        # latest.yml、version.json 等元数据不缓存
        location ~* \.(yml|json)$ {
            add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
            add_header Pragma 'no-cache' always;
            add_header Expires '0' always;
            add_header Access-Control-Allow-Origin * always;
        }

        # exe 和 blockmap 文件可长时间缓存
        location ~* \.(exe|blockmap)$ {
            # 【安全】下载大文件时限制速率
            limit_req zone=download_limit burst=5 nodelay;
            add_header Cache-Control 'public, max-age=604800' always;
            add_header Access-Control-Allow-Origin * always;
        }
    }

    # ==================== ai-anime 用户端发布 - 测试版 ====================
    # 路径: /ai-anime/releases/client/beta/
    # 对应目录: /www/ai_anime/releases/client/beta/
    location /ai-anime/releases/client/beta/ {
        alias /www/ai_anime/releases/client/beta/;

        # 【安全】只允许 GET / HEAD / OPTIONS 方法
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        # latest.yml、version.json 等元数据不缓存
        location ~* \.(yml|json)$ {
            add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
            add_header Pragma 'no-cache' always;
            add_header Expires '0' always;
            add_header Access-Control-Allow-Origin * always;
        }

        # exe 和 blockmap 文件缓存时间较短（测试版更新频繁）
        location ~* \.(exe|blockmap)$ {
            add_header Cache-Control 'public, max-age=86400' always;
            add_header Access-Control-Allow-Origin * always;
        }
    }

    # ==================== ai-anime 管理端发布 - 正式版 ====================
    # 路径: /ai-anime/releases/admin/stable/
    # 对应目录: /www/ai_anime/releases/admin/stable/
    location /ai-anime/releases/admin/stable/ {
        alias /www/ai_anime/releases/admin/stable/;

        # 【安全】只允许 GET / HEAD / OPTIONS 方法
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        # 【安全】限制请求速率
        limit_req zone=update_limit burst=20 nodelay;

        # 【安全】仅允许访问更新相关文件类型
        location ~* \.(exe|blockmap|yml|json)$ {
        }

        # 【安全】拒绝其他所有文件类型
        location ~* \.*$ {
            return 403;
        }

        # latest.yml、version.json 等元数据不缓存
        location ~* \.(yml|json)$ {
            add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
            add_header Pragma 'no-cache' always;
            add_header Expires '0' always;
            add_header Access-Control-Allow-Origin * always;
        }

        # exe 和 blockmap 文件可长时间缓存
        location ~* \.(exe|blockmap)$ {
            # 【安全】下载大文件时限制速率
            limit_req zone=download_limit burst=5 nodelay;
            add_header Cache-Control 'public, max-age=604800' always;
            add_header Access-Control-Allow-Origin * always;
        }
    }

    # ==================== ai-anime 管理端发布 - 测试版 ====================
    # 路径: /ai-anime/releases/admin/beta/
    # 对应目录: /www/ai_anime/releases/admin/beta/
    location /ai-anime/releases/admin/beta/ {
        alias /www/ai_anime/releases/admin/beta/;

        # 【安全】只允许 GET / HEAD / OPTIONS 方法
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        # latest.yml、version.json 等元数据不缓存
        location ~* \.(yml|json)$ {
            add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
            add_header Pragma 'no-cache' always;
            add_header Expires '0' always;
            add_header Access-Control-Allow-Origin * always;
        }

        # exe 和 blockmap 文件缓存时间较短（测试版更新频繁）
        location ~* \.(exe|blockmap)$ {
            add_header Cache-Control 'public, max-age=86400' always;
            add_header Access-Control-Allow-Origin * always;
        }
    }

    # ==================== momentum 用户端认证API（服务端登录方案） ====================
    # 路径: /momentum-stickfigure/client/api/
    # 代理到本地3000端口的Node.js API服务器
    location /momentum-stickfigure/client/api/ {
        proxy_pass http://localhost:3000/momentum-stickfigure/client/api/;
        proxy_http_version 1.1;

        # 代理头配置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 【安全】限制API请求速率（防止暴力破解）
        limit_req zone=update_limit burst=10 nodelay;

        # 超时配置
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # 跨域配置（CORS）
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;
        add_header Access-Control-Max-Age 3600 always;

        # 处理OPTIONS预检请求
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ==================== 用户端 - 正式版 ====================
    # 路径: /releases/client/stable/
    # 对应项目: momentum-stickfigure-main（旧项目，更新文件仍在 /www/momentum_stickfigure）
    location /releases/client/stable/ {
        # 说明：虽然根目录 root 已改为 /www/update_server_web，但旧项目更新文件未移动，
        # 因此继续使用 /www/momentum_stickfigure 作为 alias 的真实路径。
        alias /www/momentum_stickfigure/releases/client/stable/;

        # 【安全】只允许GET、HEAD、OPTIONS方法（更新服务不需要POST）
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        # 【安全】限制请求速率
        limit_req zone=update_limit burst=20 nodelay;

        # 【安全】只允许访问特定文件类型
        location ~* \.(exe|blockmap|yml|json)$ {
            # 继续处理
        }

        # 【安全】拒绝其他所有文件类型
        location ~* \.*$ {
            return 403;
        }

        # latest.yml、version.json 不缓存
        location ~* \.(yml|json)$ {
            add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
            add_header Pragma 'no-cache' always;
            add_header Expires '0' always;
            add_header Access-Control-Allow-Origin * always;
        }

        # exe 和 blockmap 文件缓存7天
        location ~* \.(exe|blockmap)$ {
            # 【安全】下载大文件时限制速率
            limit_req zone=download_limit burst=5 nodelay;
            add_header Cache-Control 'public, max-age=604800' always;
            add_header Access-Control-Allow-Origin * always;
        }
    }

    # ==================== 用户端 - 测试版 ====================
    # 路径: /releases/client/beta/
    # 对应项目: momentum-stickfigure-main (beta)（旧项目，更新文件仍在 /www/momentum_stickfigure）
    location /releases/client/beta/ {
        alias /www/momentum_stickfigure/releases/client/beta/;

        # 【安全】只允许GET、HEAD、OPTIONS方法
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        # latest.yml、version.json 不缓存
        location ~* \.(yml|json)$ {
            add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
            add_header Pragma 'no-cache' always;
            add_header Expires '0' always;
            add_header Access-Control-Allow-Origin * always;
        }

        # exe 和 blockmap 文件缓存1天（测试版更新频繁）
        location ~* \.(exe|blockmap)$ {
            add_header Cache-Control 'public, max-age=86400' always;
            add_header Access-Control-Allow-Origin * always;
        }
    }

    # ==================== 管理端 - 正式版 ====================
    # 路径: /releases/admin/stable/
    # 对应项目: momentum-stickfigure-mysql（旧项目，更新文件仍在 /www/momentum_stickfigure）
    location /releases/admin/stable/ {
        alias /www/momentum_stickfigure/releases/admin/stable/;

        # 【安全】只允许GET、HEAD、OPTIONS方法
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        # latest.yml、version.json 不缓存
        location ~* \.(yml|json)$ {
            add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
            add_header Pragma 'no-cache' always;
            add_header Expires '0' always;
            add_header Access-Control-Allow-Origin * always;
        }

        # exe 和 blockmap 文件缓存7天
        location ~* \.(exe|blockmap)$ {
            add_header Cache-Control 'public, max-age=604800' always;
            add_header Access-Control-Allow-Origin * always;
        }
    }

    # ==================== 管理端 - 测试版 ====================
    # 路径: /releases/admin/beta/
    # 对应项目: momentum-stickfigure-mysql (beta)（旧项目，更新文件仍在 /www/momentum_stickfigure）
    location /releases/admin/beta/ {
        alias /www/momentum_stickfigure/releases/admin/beta/;

        # 【安全】只允许GET、HEAD、OPTIONS方法
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        # latest.yml、version.json 不缓存
        location ~* \.(yml|json)$ {
            add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
            add_header Pragma 'no-cache' always;
            add_header Expires '0' always;
            add_header Access-Control-Allow-Origin * always;
        }

        # exe 和 blockmap 文件缓存1天（测试版更新频繁）
        location ~* \.(exe|blockmap)$ {
            add_header Cache-Control 'public, max-age=86400' always;
            add_header Access-Control-Allow-Origin * always;
        }
    }

    # 日志配置（宝塔面板标准路径）
    access_log /www/wwwlogs/momentum_update_access.log;
    error_log /www/wwwlogs/momentum_update_error.log;

    # 限制文件大小（允许下载大文件）
    client_max_body_size 500M;

    # 【安全】限制请求体大小（防止上传攻击）
    client_body_buffer_size 128k;

    # 【安全】超时配置
    client_header_timeout 10s;
    client_body_timeout 10s;
    send_timeout 30s;
}
