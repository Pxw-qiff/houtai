server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: chuamgwei-admin

  # 数据源配置：生产环境通过环境变量指向共享用户库所在 database
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/chuamgwei_gateway?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: ChuamgweiHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis 配置：生产环境通过环境变量注入真实地址和密码
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: 5000
    lettuce:
      pool:
        max-active: 50
        max-idle: 10
        min-idle: 2
        max-wait: -1ms

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 开启下划线转驼峰
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印 SQL 日志 (开发环境有用，生产可关闭)
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.chuamgwei.infrastructure.entity,com.chuamgwei.module.wallet.entity,com.chuamgwei.module.task.entity

# 支付宝支付配置：真实密钥必须通过环境变量注入
alipay:
  app-id: ${ALIPAY_APP_ID:}
  private-key: ${ALIPAY_PRIVATE_KEY:}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
  server-url: ${ALIPAY_SERVER_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  notify-url: ${ALIPAY_NOTIFY_URL:http://127.0.0.1:8080/v1/recharge/callback/alipay}

auth:
  # 生产环境必须与 Node JWT_SECRET 保持一致
  jwt-secret: ${AUTH_JWT_SECRET:change-me}
  jwt-expire-minutes: ${AUTH_JWT_EXPIRE_MINUTES:720}
  ticket-prefix: ${AUTH_TICKET_PREFIX:ticket:}

internal:
  credit:
    secret: ${INTERNAL_CREDIT_SECRET:}
